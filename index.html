<!DOCTYPE html>
<html>
<head>
  <title>Cronograma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/png" href="https://flysantos.com/wp-content/uploads/2025/03/CA.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbxHhYBvJD3vbHfu8yHQB92mQXYhwYjwVG1JigHfm1D5mGLjpTFKhGegx5NsBxHgIcUU/exec" 
    frameborder="0"
    allowfullscreen
    allow="clipboard-read; clipboard-write"
  ></iframe>
</body>
</html>
