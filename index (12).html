<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">

  <title>FITLOG</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0e10">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FITLOG">
  <link rel="apple-touch-icon" href="https://flysantos.com/wp-content/uploads/2025/03/CA.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://flysantos.com/wp-content/uploads/2025/03/CA.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      background: #0d0e10;
    }

    /* Splash enquanto o iframe carrega */
    #splash {
      position: fixed; inset: 0;
      background: #0d0e10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-logo {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 44px; font-weight: 900;
      letter-spacing: -1px; text-transform: uppercase;
      color: #f0f0f0;
    }
    .splash-logo span { color: #c8f000; }

    .splash-spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(200,240,0,0.15);
      border-top-color: #c8f000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-logo">FIT<span>LOG</span></div>
    <div class="splash-spinner"></div>
  </div>

  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbxHhYBvJD3vbHfu8yHQB92mQXYhwYjwVG1JigHfm1D5mGLjpTFKhGegx5NsBxHgIcUU/exec"
    allowfullscreen
    allow="clipboard-read; clipboard-write">
  </iframe>

  <script>
    // Registra o Service Worker — obrigatório para instalar como app no Android
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }

    // Remove splash quando o iframe carregar
    document.getElementById('app').addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        s.classList.add('hidden');
        setTimeout(function(){ s.style.display = 'none'; }, 450);
      }, 300);
    });

    // Fallback: remove splash após 7s de qualquer forma
    setTimeout(function() {
      document.getElementById('splash').classList.add('hidden');
    }, 7000);
  </script>
</body>
</html>
